name: Notion Sync

on:
  workflow_call:
    secrets:
      NOTION_API_KEY:
        required: false
      NOTION_TASKS_DB_ID:
        required: false

jobs:
  create-task:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Create Notion task from issue
        uses: actions/github-script@v8
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TASKS_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
        with:
          script: |
            const issueUrl = context.payload.issue.html_url;
            const issueNumber = context.payload.issue.number;
            const issueTitle = context.payload.issue.title;
            const issueLabels = context.payload.issue.labels.map(l => l.name);

            const notionKey = process.env.NOTION_API_KEY;
            const dbId = process.env.NOTION_TASKS_DB_ID;
            const headers = {
              'Authorization': `Bearer ${notionKey}`,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
            };

            // Idempotency check: skip if task already exists for this URL
            const checkRes = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
              method: 'POST',
              headers,
              body: JSON.stringify({
                filter: { property: 'GitHub URL', url: { equals: issueUrl } }
              })
            });
            const checkData = await checkRes.json();

            if (checkData.results?.length > 0) {
              console.log(`Task already exists for ${issueUrl}, skipping.`);
              return;
            }

            // Map GitHub labels → Notion Tags and Priority
            const labelToTag = {
              'bug': 'Bug', 'frontend': 'Frontend', 'backend': 'Backend',
              'devops': 'Devops', 'security': 'Security', 'documentation': 'Docs',
              'monitoring': 'Monitoring', 'internal': 'Internal/Technical'
            };
            const priorityMap = {
              'priority: high': 'High', 'high': 'High',
              'priority: medium': 'Medium', 'medium': 'Medium',
              'priority: low': 'Low', 'low': 'Low'
            };
            const lowerLabels = issueLabels.map(l => l.toLowerCase());
            const tags = lowerLabels.map(l => labelToTag[l]).filter(Boolean);
            const priority = lowerLabels.map(l => priorityMap[l]).find(Boolean) || 'Medium';

            const properties = {
              'Subtask Name': { title: [{ text: { content: issueTitle } }] },
              'GitHub URL': { url: issueUrl },
              'GitHub Issue Number': { number: issueNumber },
              'Status': { select: { name: 'In progress' } },
              'Priority': { select: { name: priority } },
            };
            if (tags.length > 0) {
              properties['Tags'] = { multi_select: tags.map(t => ({ name: t })) };
            }

            const createRes = await fetch('https://api.notion.com/v1/pages', {
              method: 'POST',
              headers,
              body: JSON.stringify({ parent: { database_id: dbId }, properties })
            });

            const created = await createRes.json();
            if (created.id) {
              console.log(`Created Notion task: ${created.url}`);
            } else {
              core.setFailed(`Failed to create Notion task: ${JSON.stringify(created)}`);
            }

  close-task:
    if: github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Update Notion task to Done on issue close
        uses: actions/github-script@v8
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TASKS_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
        with:
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const dbId = process.env.NOTION_TASKS_DB_ID;
            if (!notionKey || !dbId) {
              console.log('Notion secrets not configured, skipping.');
              return;
            }

            const issueUrl = context.payload.issue.html_url;
            const issueNumber = context.payload.issue.number;
            const headers = {
              'Authorization': `Bearer ${notionKey}`,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
            };

            // Find page by URL, fall back to issue number
            let pageId = null;
            const urlRes = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
              method: 'POST', headers,
              body: JSON.stringify({ filter: { property: 'GitHub URL', url: { equals: issueUrl } } })
            });
            const urlData = await urlRes.json();
            if (urlData.results?.length > 0) {
              pageId = urlData.results[0].id;
            } else {
              const numRes = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
                method: 'POST', headers,
                body: JSON.stringify({ filter: { property: 'GitHub Issue Number', number: { equals: issueNumber } } })
              });
              const numData = await numRes.json();
              if (numData.results?.length > 0) pageId = numData.results[0].id;
            }

            if (!pageId) {
              console.log(`No Notion task found for issue #${issueNumber}, skipping.`);
              return;
            }

            const updateRes = await fetch(`https://api.notion.com/v1/pages/${pageId}`, {
              method: 'PATCH', headers,
              body: JSON.stringify({ properties: { 'Status': { select: { name: 'Done' } } } })
            });
            const updated = await updateRes.json();
            if (updated.id) {
              console.log(`Notion task ${pageId} → Done (issue #${issueNumber} closed)`);
            } else {
              console.error(`Failed: ${JSON.stringify(updated)}`);
            }

  update-task:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Update Notion task to Done on PR merge
        uses: actions/github-script@v8
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TASKS_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(pattern)];

            if (matches.length === 0) {
              console.log('No closing issue reference in PR body, skipping Notion update.');
              return;
            }

            const notionKey = process.env.NOTION_API_KEY;
            const dbId = process.env.NOTION_TASKS_DB_ID;
            const headers = {
              'Authorization': `Bearer ${notionKey}`,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
            };

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              const issueUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${issueNumber}`;

              let pageId = null;
              const urlRes = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
                method: 'POST',
                headers,
                body: JSON.stringify({
                  filter: { property: 'GitHub URL', url: { equals: issueUrl } }
                })
              });
              const urlData = await urlRes.json();

              if (urlData.results?.length > 0) {
                pageId = urlData.results[0].id;
              } else {
                const numRes = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
                  method: 'POST',
                  headers,
                  body: JSON.stringify({
                    filter: { property: 'GitHub Issue Number', number: { equals: issueNumber } }
                  })
                });
                const numData = await numRes.json();
                if (numData.results?.length > 0) pageId = numData.results[0].id;
              }

              if (!pageId) {
                console.log(`No Notion task found for issue #${issueNumber}, skipping.`);
                continue;
              }

              const updateRes = await fetch(`https://api.notion.com/v1/pages/${pageId}`, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  properties: { 'Status': { select: { name: 'Done' } } }
                })
              });
              const updated = await updateRes.json();

              if (updated.id) {
                console.log(`Notion task ${pageId} updated to Done (issue #${issueNumber})`);
              } else {
                console.error(`Failed to update task: ${JSON.stringify(updated)}`);
              }
            }

  sync-github-comment-to-notion:
    if: github.event_name == 'issue_comment' && github.event.action == 'created'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Sync GitHub comment to linked Notion task
        uses: actions/github-script@v8
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TASKS_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
        with:
          script: |
            const body = context.payload.comment.body || '';

            // Skip comments synced FROM Notion (avoid loop)
            if (body.includes('<!-- notion-comment-id:')) {
              console.log('Skipping synced-from-Notion comment to avoid loop.');
              return;
            }

            const notionKey = process.env.NOTION_API_KEY;
            const dbId = process.env.NOTION_TASKS_DB_ID;
            if (!notionKey || !dbId) {
              console.log('Notion secrets not configured, skipping.');
              return;
            }

            const issueUrl = context.payload.issue.html_url;
            const commentId = context.payload.comment.id;
            const username = context.payload.comment.user.login;

            const headers = {
              'Authorization': `Bearer ${notionKey}`,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
            };

            // Find linked Notion page by GitHub issue URL
            const queryRes = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
              method: 'POST',
              headers,
              body: JSON.stringify({
                filter: { property: 'GitHub URL', url: { equals: issueUrl } }
              })
            });
            const queryData = await queryRes.json();
            if (!queryData.results?.length) {
              console.log(`No Notion task found for ${issueUrl}, skipping.`);
              return;
            }

            const pageId = queryData.results[0].id;

            // Dedup: skip if already synced (Notion comment starts with [GH:{commentId}])
            const existingRes = await fetch(
              `https://api.notion.com/v1/comments?block_id=${pageId}`,
              { headers }
            );
            const existingData = await existingRes.json();
            const alreadySynced = (existingData.results || []).some(c => {
              const text = (c.rich_text || []).map(t => t.plain_text).join('');
              return text.startsWith(`[GH:${commentId}]`);
            });

            if (alreadySynced) {
              console.log(`Comment ${commentId} already synced to Notion, skipping.`);
              return;
            }

            // Create Notion comment — [GH:id] prefix = dedup marker + loop guard
            const commentText = `[GH:${commentId}] @${username}: ${body}`;
            const createRes = await fetch('https://api.notion.com/v1/comments', {
              method: 'POST',
              headers,
              body: JSON.stringify({
                parent: { page_id: pageId },
                rich_text: [{ text: { content: commentText } }]
              })
            });
            const created = await createRes.json();
            if (created.id) {
              console.log(`Synced GitHub comment ${commentId} → Notion page ${pageId}`);
            } else {
              console.error(`Failed to create Notion comment: ${JSON.stringify(created)}`);
            }
