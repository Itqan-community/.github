name: Stale PRs

on:
  workflow_call:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # PRs only — issues managed manually
          days-before-issue-stale: -1
          days-before-issue-close: -1

          days-before-pr-stale: 14
          days-before-pr-close: 7

          stale-pr-label: stale
          stale-pr-message: >
            This PR has had no activity for 14 days and has been marked as stale.
            It will be closed in 7 days unless there is new activity.
            If this is still being worked on, please leave a comment or push a commit.

          close-pr-message: >
            This PR was automatically closed after 21 days of inactivity.
            Feel free to reopen it if you resume work on this.

          operations-per-run: 30
