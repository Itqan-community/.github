name: Notion to GitHub Sync

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: 'Minutes to look back for recent Notion edits (pass 1). Pass 2 always runs full reconciliation.'
        default: '2'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Sync Notion status + comments to GitHub issues
        uses: actions/github-script@v8
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TASKS_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
          GH_PAT: ${{ secrets.GH_PAT_STANDUP }}
          LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '2' }}
        with:
          script: |
            const notionKey = process.env.NOTION_API_KEY;
            const dbId = process.env.NOTION_TASKS_DB_ID;
            const ghToken = process.env.GH_PAT;

            if (!notionKey || !dbId || !ghToken) {
              console.log('Missing secrets, skipping.');
              return;
            }

            const notionHeaders = {
              'Authorization': `Bearer ${notionKey}`,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
            };
            const ghHeaders = {
              'Authorization': `token ${ghToken}`,
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'Itqan-notion-to-github-sync'
            };

            // ── Status → label mapping ──
            const STATUS_LABEL_MAP = {
              'Todo':               { label: 'status: todo',        color: 'C5DEF5' },
              'In progress':        { label: 'status: in-progress', color: '0075CA' },
              'Review By Business': { label: 'status: review',      color: 'E4B849' },
              'Active Backlog':     { label: 'status: backlog',     color: 'D4C5F9' },
            };
            const ALL_STATUS_LABELS = Object.values(STATUS_LABEL_MAP).map(v => v.label);

            // Ensure a status label exists in the repo (upsert)
            async function ensureLabel(owner, repo, labelDef) {
              const checkRes = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/labels/${encodeURIComponent(labelDef.label)}`,
                { headers: ghHeaders }
              );
              if (!checkRes.ok) {
                await fetch(`https://api.github.com/repos/${owner}/${repo}/labels`, {
                  method: 'POST', headers: ghHeaders,
                  body: JSON.stringify({ name: labelDef.label, color: labelDef.color })
                });
              }
            }

            // Sync label on a GitHub issue to match Notion status
            async function syncLabel(owner, repo, issueNumber, notionStatus) {
              const labelsRes = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}/labels`,
                { headers: ghHeaders }
              );
              const currentLabels = labelsRes.ok ? await labelsRes.json() : [];
              const currentStatusLabels = currentLabels.filter(l => ALL_STATUS_LABELS.includes(l.name));
              const targetLabelDef = STATUS_LABEL_MAP[notionStatus];

              if (notionStatus === 'Done') {
                // Remove all status labels on close
                for (const l of currentStatusLabels) {
                  await fetch(
                    `https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}/labels/${encodeURIComponent(l.name)}`,
                    { method: 'DELETE', headers: ghHeaders }
                  );
                }
              } else if (targetLabelDef) {
                // Ensure label exists, remove wrong ones, add correct one
                await ensureLabel(owner, repo, targetLabelDef);
                for (const l of currentStatusLabels) {
                  if (l.name !== targetLabelDef.label) {
                    await fetch(
                      `https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}/labels/${encodeURIComponent(l.name)}`,
                      { method: 'DELETE', headers: ghHeaders }
                    );
                  }
                }
                if (!currentStatusLabels.some(l => l.name === targetLabelDef.label)) {
                  await fetch(
                    `https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}/labels`,
                    {
                      method: 'POST', headers: ghHeaders,
                      body: JSON.stringify({ labels: [targetLabelDef.label] })
                    }
                  );
                  console.log(`  [${owner}/${repo}#${issueNumber}] Label set → ${targetLabelDef.label}`);
                }
              }
            }

            // ── Process one task ──
            async function processTask(task) {
              const notionStatus = task.properties['Status']?.select?.name;
              const githubUrl = task.properties['GitHub URL']?.url;
              const taskTitle = task.properties['Subtask Name']?.title?.[0]?.plain_text || 'Untitled';

              if (!githubUrl) return;
              const issueMatch = githubUrl.match(/github\.com\/([^/]+)\/([^/]+)\/issues\/(\d+)/);
              if (!issueMatch) return;

              const [, owner, repo, issueNumberStr] = issueMatch;
              const issueNumber = parseInt(issueNumberStr);

              const issueRes = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}`,
                { headers: ghHeaders }
              );
              if (!issueRes.ok) return;
              const issue = await issueRes.json();

              // State sync
              if (notionStatus === 'Done' && issue.state === 'open') {
                const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}`, {
                  method: 'PATCH', headers: ghHeaders,
                  body: JSON.stringify({ state: 'closed' })
                });
                if (r.ok) {
                  await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}/comments`, {
                    method: 'POST', headers: ghHeaders,
                    body: JSON.stringify({ body: '✅ Closed automatically — task marked **Done** in Notion.' })
                  });
                  console.log(`  [${owner}/${repo}#${issueNumber}] Closed (Notion=Done)`);
                }
              } else if (
                ['Todo', 'In progress', 'Review By Business', 'Active Backlog'].includes(notionStatus) &&
                issue.state === 'closed'
              ) {
                const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}`, {
                  method: 'PATCH', headers: ghHeaders,
                  body: JSON.stringify({ state: 'open' })
                });
                if (r.ok) {
                  await fetch(`https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}/comments`, {
                    method: 'POST', headers: ghHeaders,
                    body: JSON.stringify({ body: `🔄 Reopened automatically — status changed to **${notionStatus}** in Notion.` })
                  });
                  console.log(`  [${owner}/${repo}#${issueNumber}] Reopened (Notion=${notionStatus})`);
                }
              }

              // Label sync (always reconcile to match Notion status)
              await syncLabel(owner, repo, issueNumber, notionStatus);

              // Comment sync (only for recently-edited tasks from pass 1)
              if (!task._fromRecent) return;

              const notionCommentsRes = await fetch(
                `https://api.notion.com/v1/comments?block_id=${task.id}`,
                { headers: notionHeaders }
              );
              const notionCommentsData = await notionCommentsRes.json();
              const notionComments = notionCommentsData.results || [];
              if (notionComments.length === 0) return;

              const ghCommentsRes = await fetch(
                `https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}/comments?per_page=100`,
                { headers: ghHeaders }
              );
              const ghComments = ghCommentsRes.ok ? await ghCommentsRes.json() : [];

              for (const nc of notionComments) {
                const ncText = (nc.rich_text || []).map(t => t.plain_text).join('');
                if (ncText.startsWith('[GH:')) continue;
                const marker = `<!-- notion-comment-id: ${nc.id} -->`;
                if (ghComments.some(c => c.body?.includes(marker))) continue;
                const authorName = nc.created_by?.name || 'Notion user';
                const r = await fetch(
                  `https://api.github.com/repos/${owner}/${repo}/issues/${issueNumber}/comments`,
                  {
                    method: 'POST', headers: ghHeaders,
                    body: JSON.stringify({
                      body: `💬 **Comment from Notion**\n> **${authorName}**: ${ncText}\n\n<!-- notion-comment-id: ${nc.id} -->`
                    })
                  }
                );
                if (r.ok) console.log(`  [${owner}/${repo}#${issueNumber}] Synced Notion comment → GitHub`);
              }
            }

            // ── PASS 1: Recently edited tasks ──
            const lookbackMinutes = parseInt(process.env.LOOKBACK_MINUTES || '2');
            const since = new Date(Date.now() - lookbackMinutes * 60 * 1000).toISOString();
            console.log(`Pass 1: tasks edited since ${since}`);

            const recentRes = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
              method: 'POST', headers: notionHeaders,
              body: JSON.stringify({
                filter: {
                  and: [
                    { timestamp: 'last_edited_time', last_edited_time: { after: since } },
                    { property: 'GitHub URL', url: { is_not_empty: true } }
                  ]
                },
                page_size: 100
              })
            });
            const recentData = await recentRes.json();
            const recentTasks = (recentData.results || []).map(t => ({ ...t, _fromRecent: true }));
            console.log(`Pass 1: ${recentTasks.length} task(s)`);
            for (const task of recentTasks) await processTask(task);

            // ── PASS 2: Full reconciliation (all tasks except Stale Backlog) ──
            console.log('Pass 2: full reconciliation');

            const allRes = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
              method: 'POST', headers: notionHeaders,
              body: JSON.stringify({
                filter: {
                  and: [
                    { property: 'GitHub URL', url: { is_not_empty: true } },
                    { property: 'Status', select: { does_not_equal: 'Stale Backlog' } }
                  ]
                },
                page_size: 100
              })
            });
            const allData = await allRes.json();
            const recentIds = new Set(recentTasks.map(t => t.id));
            const reconcileTasks = (allData.results || []).filter(t => !recentIds.has(t.id));
            console.log(`Pass 2: ${reconcileTasks.length} task(s)`);
            for (const task of reconcileTasks) await processTask(task);
