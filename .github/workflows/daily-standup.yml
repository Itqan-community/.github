name: Daily Standup

on:
  schedule:
    - cron: '40 6 * * 1-5'   # 9:40am Riyadh (UTC+3)
  workflow_dispatch:
    inputs:
      force:
        description: 'Post even if already sent today'
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Set date
        run: echo "TODAY=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Idempotency check
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: .standup-sent
          key: standup-${{ env.TODAY }}

      - name: Post standup
        if: steps.cache.outputs.cache-hit != 'true' || inputs.force == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_STANDUP }}
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
          GITHUB_PAT: ${{ secrets.GH_PAT_STANDUP }}
          STANDUP_USER_MAP: ${{ secrets.STANDUP_USER_MAP }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, datetime, urllib.request, urllib.error
          from collections import defaultdict

          SLACK_WEBHOOK  = os.environ["SLACK_WEBHOOK"]
          NOTION_TOKEN   = os.environ["NOTION_TOKEN"]
          NOTION_DB_ID   = os.environ["NOTION_DB_ID"]
          GH_TOKEN       = os.environ.get("GITHUB_PAT") or os.environ.get("GITHUB_TOKEN", "")
          USER_MAP       = json.loads(os.environ.get("STANDUP_USER_MAP") or "{}")
          ORG            = "Itqan-community"
          SINCE_HOURS    = 24

          now    = datetime.datetime.now(datetime.timezone.utc)
          since  = (now - datetime.timedelta(hours=SINCE_HOURS)).isoformat()
          today  = now.strftime("%a %d %b")

          gh_headers = {
              "Authorization": f"Bearer {GH_TOKEN}",
              "Accept": "application/vnd.github+json",
          }
          notion_headers = {
              "Authorization": f"Bearer {NOTION_TOKEN}",
              "Notion-Version": "2022-06-28",
              "Content-Type": "application/json",
          }

          def gh_get(url):
              req = urllib.request.Request(url, headers=gh_headers)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.load(r)
              except urllib.error.HTTPError as e:
                  return []

          def notion_post(url, body):
              data = json.dumps(body).encode()
              req = urllib.request.Request(url, data=data, headers=notion_headers, method="POST")
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.load(r)
              except urllib.error.HTTPError:
                  return {}

          def slack_post(blocks):
              data = json.dumps({"blocks": blocks}).encode()
              req = urllib.request.Request(SLACK_WEBHOOK, data=data,
                  headers={"Content-Type": "application/json"}, method="POST")
              with urllib.request.urlopen(req) as r:
                  print(f"Slack: HTTP {r.status}")

          # ── 1. GitHub activity last 24h ──────────────────────────────────────
          activity = defaultdict(lambda: {"commits": 0, "repos": set(), "prs_opened": 0, "prs_merged": 0})
          page = 1
          while page <= 5:
              events = gh_get(f"https://api.github.com/orgs/{ORG}/events?per_page=100&page={page}")
              if not events:
                  break
              found_old = False
              for e in events:
                  if e.get("created_at", "9999") < since:
                      found_old = True
                      continue
                  actor  = e.get("actor", {}).get("login", "")
                  etype  = e.get("type", "")
                  repo   = e.get("repo", {}).get("name", "").split("/")[-1]
                  if etype == "PushEvent":
                      n = len(e.get("payload", {}).get("commits", []))
                      activity[actor]["commits"] += n
                      if n:
                          activity[actor]["repos"].add(repo)
                  elif etype == "PullRequestEvent":
                      action = e.get("payload", {}).get("action", "")
                      merged = e.get("payload", {}).get("pull_request", {}).get("merged", False)
                      if action == "opened":
                          activity[actor]["prs_opened"] += 1
                      elif action == "closed" and merged:
                          activity[actor]["prs_merged"] += 1
              if found_old or len(events) < 100:
                  break
              page += 1

          # ── 2. Notion in-progress tasks ──────────────────────────────────────
          notion_tasks = defaultdict(list)
          cursor = None
          while True:
              body = {
                  "filter": {"or": [
                      {"property": "Status", "select": {"equals": "In progress"}},
                      {"property": "Status", "select": {"equals": "Review By Business"}},
                  ]},
                  "page_size": 100,
              }
              if cursor:
                  body["start_cursor"] = cursor
              data = notion_post(f"https://api.notion.com/v1/databases/{NOTION_DB_ID}/query", body)
              for page in data.get("results", []):
                  props = page.get("properties", {})
                  title = (props.get("Subtask Name", {}).get("title") or [{}])[0].get("plain_text", "")
                  people = props.get("Assigned To", {}).get("people", [])
                  for person in people:
                      notion_tasks[person.get("name", "")].append(title)
              if not data.get("has_more"):
                  break
              cursor = data.get("next_cursor")

          # ── 3. PRs awaiting review ───────────────────────────────────────────
          pr_search = gh_get(
              f"https://api.github.com/search/issues"
              f"?q=is:pr+is:open+org:{ORG}+review:required&per_page=10"
          )
          awaiting_review = []
          for item in (pr_search.get("items") or [])[:5]:
              repo_name = item.get("repository_url", "").split("/")[-1]
              number    = item.get("number", "?")
              title     = item.get("title", "")[:45]
              awaiting_review.append(f"#{number} {repo_name}: {title}")

          # ── 4. Build per-person blocks ───────────────────────────────────────
          blocks = [
              {"type": "header", "text": {"type": "plain_text", "text": f"📋 Daily Standup — {today}"}},
              {"type": "divider"},
          ]

          # Identify active people: anyone with GitHub activity OR Notion tasks
          active_logins = set(activity.keys()) | {
              login
              for login, info in USER_MAP.items()
              if info.get("notion") and any(
                  n.startswith(info["notion"].split()[0]) for n in notion_tasks
              )
          }
          # Order: known users first, in USER_MAP order, then unknown actives
          ordered = [l for l in USER_MAP if l in active_logins]
          ordered += [l for l in active_logins if l not in USER_MAP]

          if not ordered:
              blocks.append({
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": "_No activity in the last 24h._"},
              })
          else:
              for login in ordered:
                  info     = USER_MAP.get(login, {})
                  name     = info.get("name") or login
                  notion_n = info.get("notion") or ""

                  # GitHub activity lines
                  act = activity.get(login, {})
                  gh_lines = []
                  if act.get("commits"):
                      repos_str = ", ".join(list(act["repos"])[:3])
                      gh_lines.append(f"🔨 {act['commits']} commit(s) to {repos_str}")
                  if act.get("prs_merged"):
                      gh_lines.append(f"✅ {act['prs_merged']} PR(s) merged")
                  if act.get("prs_opened"):
                      gh_lines.append(f"🔃 {act['prs_opened']} PR(s) opened")

                  # Notion task lines
                  task_lines = []
                  if notion_n:
                      for assignee_name, tasks in notion_tasks.items():
                          if assignee_name.startswith(notion_n.split()[0]):
                              task_lines = [f"📌 {t[:55]}" for t in tasks[:4]]

                  if not gh_lines and not task_lines:
                      continue

                  text = f"*👤 {name}*\n"
                  if gh_lines:
                      text += "\n".join(f"  {l}" for l in gh_lines) + "\n"
                  if task_lines:
                      text += "\n".join(f"  {l}" for l in task_lines) + "\n"

                  blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": text.rstrip()}})

          # PRs awaiting review
          if awaiting_review:
              pr_text = "👀 *Awaiting review:*\n" + "\n".join(f"  • {p}" for p in awaiting_review)
              blocks.append({"type": "divider"})
              blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": pr_text}})

          slack_post(blocks)
          print(f"Standup posted for {today}.")
          PYEOF

      - name: Mark as sent
        if: steps.cache.outputs.cache-hit != 'true' && inputs.force != 'true'
        run: mkdir -p .standup-sent && echo "sent" > .standup-sent/done

      - name: Save idempotency cache
        if: steps.cache.outputs.cache-hit != 'true' && inputs.force != 'true'
        uses: actions/cache/save@v4
        with:
          path: .standup-sent
          key: standup-${{ env.TODAY }}
