name: Org Compliance Check

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required workflow stubs present
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.error, os, sys

          token = os.environ["GH_TOKEN"]
          repo  = os.environ["GITHUB_REPOSITORY"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          }

          REQUIRED = [
              "branch-naming.yml",
              "slack-notifications.yml",
              "notion-sync.yml",
              "stale.yml",
              "release-drafter.yml",
          ]

          missing = []
          for stub in REQUIRED:
              url = f"https://api.github.com/repos/{repo}/contents/.github/workflows/{stub}"
              req = urllib.request.Request(url, headers=headers)
              try:
                  urllib.request.urlopen(req)
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      missing.append(stub)
                  else:
                      print(f"Warning: HTTP {e.code} while checking {stub}")

          if missing:
              for m in missing:
                  print(f"::error::Missing required stub: .github/workflows/{m}")
              print("Run bootstrap.sh from Itqan-community/.github to restore missing stubs.")
              sys.exit(1)

          print(f"OK — all {len(REQUIRED)} required stubs present.")
          PYEOF
